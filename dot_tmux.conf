# for some terminal emulators to work properly
set -sa terminal-overrides ",xterm-256color:Tc"
set -sa terminal-overrides ",$TERM:Tc"

# Non-visible features
set -g focus-events on
set -g mouse on
set -s escape-time 0
set -sa set-clipboard on

# Status
if-shell -b '[ "$TMUX_STATUSLINE" = "false" ]' \
  'set -g status off' \
  'set -g status on'
set -g status-position top
if-shell -b 'test -z "$SSH_CLIENT"' \
  'set -g status-bg gray90' \
  'set -g status-bg cyan'
set -g status-fg gray30
set-window-option -g window-status-current-format '#[bg=gray50,fg=gray90] #I:#T '
set-window-option -g window-status-format '#[bg=gray80,fg=gray20] #I:#T '

# Key bindings
bind -n M-\; choose-tree

## session
bind -n M-C new-session
bind -n M-n switch-client -n
bind -n M-N switch-client -p

## window
bind -n M-c new-window -a -c "#{pane_current_path}"
bind -n M-t next-window
bind -n M-T previous-window
bind -n M-Left swap-window -t -1 \; previous-window
bind -n M-Right swap-window -t +1 \; next-window

## pane
bind-key M-w send-prefix
bind-key -n M-w switch-client -T vim-C-W
bind -T vim-C-W T break-pane
bind -T vim-C-W M-v split-window -h -c "#{pane_current_path}"
bind -T vim-C-W M-s split-window -v -c "#{pane_current_path}"
bind -T vim-C-W c kill-pane
bind -T vim-C-W h select-pane -L
bind -T vim-C-W j select-pane -D
bind -T vim-C-W k select-pane -U
bind -T vim-C-W l select-pane -R

