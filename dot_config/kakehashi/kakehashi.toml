# Documentation: https://github.com/atusy/kakehashi/blob/main/docs/README.md

autoInstall = true
searchPaths = [
  "${HOME}/ghq/github.com/atusy/kakehashi.nvim",
  "${HOME}/.local/share/nvim/lazy/nvim-treesitter-context",
  "${HOME}/ghq/github.com/nvim-orgmode/tree-sitter-org",
  "${KAKEHASHI_DATA_DIR}"
]

[languages.markdown.layers.aggregation."textDocument/formatting"]
strategy = "concatenated"

[languages.org]
parser = "${HOME}/ghq/github.com/nvim-orgmode/tree-sitter-org/org.dylib"
queries = [
  { path = "${HOME}/ghq/github.com/nvim-orgmode/tree-sitter-org/queries/highlights.scm" },
  { path = "${HOME}/ghq/github.com/nvim-orgmode/tree-sitter-org/queries/injections.scm" }
]

[languages.rmd]
base = "markdown"
# [languages.rmd.bridge]
# r = { enabled = false } # r_language_server directly handles rmd file

[languages.qmd]
base = "markdown"
# [languages.qmd.bridge]
# r = { enabled = false } # r_language_server directly handles qmd file

[languages.quarto]
base = "qmd"

[languages.rmarkdown]
base = "rmd"

[languages.markdown.bridge._self.aggregation]
"textDocument/formatting" = { "priorities" = [] }

[languages._.bridge._.aggregation]
"_" = { "priorities" = ["*"] }

[languages._.bridge._self]
enabled = true

[languages._.bridge.python.aggregation]
"textDocument/completion" = { "priorities" = ["basedpyright"] }
"textDocument/formatting" = { "priorities" = ["basedpyright"] }

[languages._.bridge.lua.aggregation]
"textDocument/formatting" = { "priorities" = ["stylua"] }

[languages._.bridge.r.aggregation]
"textDocument/formatting" = { "priorities" = ["air"] }

[languages.lua.bridge._self]
aggregation = {
  "_" = { "priorities" = ["lua_ls"] },
  "textDocument/formatting" = { "priorities" = ["stylua"] }
}

[languages.sh]
base = "bash" # because Neovim maps bash filetype to sh languageId

[languageServers._]
preferSharedInstance = true

[languageServers]
air = { enabled = true }
basedpyright = { enabled = true }
bashls = { enabled = true }
efm = { enabled = true }
jsonls = { enabled = true }
lua_ls = { enabled = true }
nixd = { enabled = true }
r_language_server = { enabled = true }
ruff = { enabled = true }
rust_analyzer = { enabled = true }
terraformls = { enabled = true }
stylua = { enabled = true }
yamlls = { enabled = true }

[captureMappings._.highlights]
"markup.heading" = "class"
"markup.heading.1" = "class"
"markup.heading.2" = "class"
"markup.heading.3" = "class"
"markup.heading.4" = "class"
"markup.heading.5" = "class"
"markup.heading.6" = "class"
"markup.italic" = "keyword"
"markup.link.label" = "keyword"
"markup.link.url" = ""
"markup.link" = ""
"markup.list.checked" = "property"
"markup.list.unchecked" = "property"
"markup.list" = "property"
"markup.math" = ""
"markup.quote" = "string"
"markup.raw.block" = "string"
"markup.raw" = "string"
"markup.strikethrough" = "keyword.deprecated"
"markup.strong" = "keyword"
"markup.underline" = "keyword"

[captureMappings.org.highlights]
# --- queries/highlights.scm ---

# Headlines: stars (`*`, `**`, ...) and the headline text.
"OrgStars1" = "class"
"OrgStars2" = "class"
"OrgStars3" = "class"
"OrgHeadlineLevel1" = "class"
"OrgHeadlineLevel2" = "class"
"OrgHeadlineLevel3" = "class"

# TODO / DONE keywords on the headline.
"OrgKeywordTodo" = "keyword"
"OrgKeywordDone" = "keyword"

# Priority cookies — [#A], [#B], ...
"OrgPriority" = "number"
"OrgPriorityCookie" = "number"

# Tags — :work:urgent:
"OrgTag" = "enumMember"
"OrgTagList" = "enumMember"

# :PROPERTIES: ... :END: drawer and its `:name: value` entries.
"OrgPropertyDrawer" = "property"
"OrgProperty" = "property"
"OrgPropertyName" = "property"
"OrgPropertyValue" = "string"

# Timestamps — <2026-05-21 Thu 09:00 +1w -2d> and [2026-05-21 Thu].
"OrgTimestampActive" = "number"
"OrgTimestampInactive" = "number"
"OrgTimestampDay" = "number"
"OrgTimestampDate" = "number"
"OrgTimestampTime" = "number"
"OrgTimestampRepeat" = "number"
"OrgTimestampDelay" = "number"

# Footnotes — [fn:1] ...
"OrgFootnoteDefinition" = ""
"OrgFootnoteLabel" = "keyword"
"OrgFootnoteDescription" = ""

# #+name: value directives (TITLE, AUTHOR, OPTIONS, NAME, CAPTION, TBLFM, ...)
"OrgDirective" = "decorator"
"OrgDirectiveName" = "decorator"
"OrgDirectiveValue" = "string"

# Line comments — # ...
"OrgComment" = "comment"

# :NAME: ... :END: drawers (LOGBOOK, etc.) — distinct from PROPERTIES.
"OrgDrawer" = "property"
"OrgDrawerName" = "property"
"OrgDrawerContents" = ""

# #+BEGIN_... / #+END_... blocks (QUOTE, EXAMPLE, VERSE, SRC, EXPORT, ...).
# Contents of SRC / EXPORT will normally be overridden by language injection.
"OrgBlock" = ""
"OrgBlockName" = "decorator"
"OrgBlockContents" = "string"
"OrgDynamicBlock" = ""
"OrgDynamicBlockName" = "decorator"
"OrgDynamicBlockContents" = "string"

# List bullets and checkboxes — mirrors `markup.list*` → property above.
"OrgListBullet" = "property"
"OrgCheckbox" = "property"
"OrgCheckInProgress" = "property"
"OrgCheckDone" = "property"

# Tables — horizontal rule and cell contents.
"OrgTableHorizontalRuler" = "operator"
"OrgCellFormula" = "operator"
"OrgCellNumber" = "number"

# --- queries/markup.scm ---
# Mirrors the markdown `markup.*` conventions above:
# strong/italic/underline → keyword, strikethrough → keyword.deprecated,
# verbatim/code → string.
"bold.start" = "keyword"
"bold.end" = "keyword"
"italic.start" = "keyword"
"italic.end" = "keyword"
"underline.start" = "keyword"
"underline.end" = "keyword"
"strikethrough.start" = "keyword.deprecated"
"strikethrough.end" = "keyword.deprecated"
"verbatim.start" = "string"
"verbatim.end" = "string"
"code.start" = "string"
"code.end" = "string"
